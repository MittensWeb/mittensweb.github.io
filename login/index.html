<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mittens Login</title>
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<main class="auth-main">
<h1>Login to Mittens</h1>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="infoText"></p>
<p>Don't have an account? <a href="/signup/index.html">Sign up here</a></p>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgLH8g-20u6zDAP2eQ0oU94DYpx5RjabI",
  authDomain: "mittens-ac688.firebaseapp.com",
  projectId: "mittens-ac688",
  storageBucket: "mittens-ac688.firebasestorage.app",
  messagingSenderId: "524822883656",
  appId: "1:524822883656:web:b03fc3d96e6925a3da977d",
  measurementId: "G-56J6FM1TLT"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const infoText = document.getElementById('infoText');

loginBtn.addEventListener('click', async ()=>{
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!email || !password){ infoText.textContent='Fill all fields'; return; }
  try{
    await signInWithEmailAndPassword(auth,email,password);
    window.location.href='/index.html';
  } catch(e){ infoText.textContent=e.message; }
});

onAuthStateChanged(auth,user=>{
  if(user) window.location.href='/index.html';
});
</script>
</body>
</html>
