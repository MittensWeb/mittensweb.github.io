<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mittens Sign Up</title>
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<main class="auth-main">
<h1>Sign Up for Mittens</h1>
<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="signupBtn">Sign Up</button>
<p>Your code: <span id="userCode"></span> <button class="copy-btn" id="copyUserCode">Copy</button></p>
<p id="infoText"></p>
<p>Already have an account? <a href="/login/index.html">Login here</a></p>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgLH8g-20u6zDAP2eQ0oU94DYpx5RjabI",
  authDomain: "mittens-ac688.firebaseapp.com",
  projectId: "mittens-ac688",
  storageBucket: "mittens-ac688.firebasestorage.app",
  messagingSenderId: "524822883656",
  appId: "1:524822883656:web:b03fc3d96e6925a3da977d",
  measurementId: "G-56J6FM1TLT"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

const usernameInput = document.getElementById('username');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const signupBtn = document.getElementById('signupBtn');
const googleBtn = document.getElementById('googleBtn');
const infoText = document.getElementById('infoText');
const userCodeSpan = document.getElementById('userCode');
const copyUserBtn = document.getElementById('copyUserCode');

function generateCode(length=5){
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let code = '';
  for(let i=0;i<length;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

signupBtn.addEventListener('click', async ()=>{
  const username = usernameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  if(!username||!email||!password){ infoText.textContent='Fill all fields'; return; }
  try{
    const cred = await createUserWithEmailAndPassword(auth,email,password);
    const code = generateCode();
    await setDoc(doc(db,'accounts',cred.user.uid),{
      username,
      email,
      code,
      friends: [],
      groups: [],
      createdAt: new Date()
    });
    userCodeSpan.textContent = code;
    infoText.textContent='Account created!';
    setTimeout(()=>window.location.href='/feed/index.html',1500);
  } catch(e){ infoText.textContent=e.message; }
});

googleBtn.addEventListener('click', async ()=>{
  try{
    const result = await signInWithPopup(auth,googleProvider);
    const user = result.user;
    const code = generateCode();
    await setDoc(doc(db,'accounts',user.uid),{
      username: user.displayName||'GoogleUser',
      email: user.email,
      code,
      friends: [],
      groups: [],
      createdAt: new Date()
    });
    userCodeSpan.textContent = code;
    infoText.textContent='Account created via Google!';
    setTimeout(()=>window.location.href='/feed/index.html',1500);
  } catch(e){ infoText.textContent=e.message; }
});

copyUserBtn.addEventListener('click',()=>{
  if(userCodeSpan.textContent) navigator.clipboard.writeText(userCodeSpan.textContent);
});
</script>
</body>

</html>
