<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mittens</title>
<link rel="stylesheet" href="/assets/styles.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignal = window.OneSignal || [];
OneSignal.push(function() {
  OneSignal.init({
    appId: "52c04054-eb84-4e70-8f4d-37cb895e365c"
  });
});
</script>
</head>

<body>

<div class="username-modal" id="usernameModal">
  <div class="username-box">
    <h3>Choose Username</h3>
    <input id="usernameInput">
    <button id="saveUsername">Save</button>
  </div>
</div>

<header>
  <img src="/assets/logo.png" class="logo">
  <div class="user-box">
    <div id="userEmail"></div>
    <div class="uid-box">
      <span id="userUID"></span>
      <button class="copy-btn" id="copyUID">Copy</button>
    </div>
  </div>
  <button id="logout">Logout</button>
</header>

<main>
  <div class="card">
    <h2>Friends</h2>
    <div class="chat-controls">
      <input id="friendCode" placeholder="Friend UID">
      <button id="addFriendBtn">Add Friend</button>
    </div>
    <ul id="friendsUl"></ul>
  </div>

  <div class="card">
    <h2>Groups</h2>
    <div class="chat-controls">
      <input id="groupName" placeholder="New group name">
      <button id="createGroupBtn">Create</button>
    </div>
    <div class="chat-controls">
      <input id="joinCode" placeholder="Group code">
      <button id="joinGroupBtn">Join</button>
    </div>
    <ul id="groupsUl"></ul>
  </div>
</main>

<div class="modal-backdrop" id="chatPopup">
  <div class="modal">
    <h3 id="chatTitle"></h3>
    <div id="chatMessages" class="messages"></div>
    <div id="replyPreview" class="reply-preview"></div>
    <input id="chatInput" placeholder="Message">
    <button id="sendBtn">Send</button>
    <button id="leaveGroupBtn">Leave Group</button>
    <button id="deleteGroupBtn">Delete Group</button>
    <button id="closeChat">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, arrayUnion, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgLH8g-20u6zDAP2eQ0oU94DYpx5RjabI",
  authDomain: "mittens-ac688.firebaseapp.com",
  projectId: "mittens-ac688",
  storageBucket: "mittens-ac688.firebasestorage.app",
  messagingSenderId: "524822883656",
  appId: "1:524822883656:web:b03fc3d96e6925a3da977d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;
let username;
let chatId;
let chatType;
let unsub;
let replyTo = null;

document.addEventListener("DOMContentLoaded", () => {
  const friendsUl = document.getElementById("friendsUl");
  const groupsUl = document.getElementById("groupsUl");
  const chatPopup = document.getElementById("chatPopup");
  const chatMessages = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const chatTitle = document.getElementById("chatTitle");
  const replyPreview = document.getElementById("replyPreview");

  onAuthStateChanged(auth, async (u) => {
    if (!u) { location = "/signup/index.html"; return; }
    user = u;
    document.getElementById("userEmail").textContent = u.email;
    document.getElementById("userUID").textContent = u.uid;

    let ref = doc(db, "accounts", u.uid);
    let snap = await getDoc(ref);

    if (!snap.exists()) {
      document.getElementById("usernameModal").style.display = "flex";
      await setDoc(ref, { uid: u.uid, friends: [], groups: [] });
    } else {
      username = snap.data().username;
      if (!username) document.getElementById("usernameModal").style.display = "flex";
    }

    setupNotifications();
    loadFriends();
    loadGroups();
  });

  async function setupNotifications() {
    const permission = await Notification.requestPermission();
    if (permission !== "granted") return;

    OneSignal.push(function() {
      OneSignal.getUserId(async function(playerId) {
        if (playerId) {
          await updateDoc(doc(db, "accounts", user.uid), { oneSignalId: playerId });
        }
      });
    });
  }

  document.getElementById("saveUsername").onclick = async () => {
    let name = document.getElementById("usernameInput").value.trim();
    if (!name) return;
    username = name;
    await updateDoc(doc(db, "accounts", user.uid), { username: name });
    document.getElementById("usernameModal").style.display = "none";
  };

  document.getElementById("logout").onclick = () => signOut(auth);
  document.getElementById("copyUID").onclick = () => navigator.clipboard.writeText(user.uid);

  async function loadFriends() {
    let snap = await getDoc(doc(db, "accounts", user.uid));
    let list = snap.data()?.friends || [];
    friendsUl.innerHTML = "";
    for (let f of list) {
      let acc = await getDoc(doc(db, "accounts", f));
      let uname = acc.data()?.username || f;
      let li = document.createElement("li");
      li.textContent = uname;
      li.onclick = () => openChat(f, "friend", uname);
      friendsUl.appendChild(li);
    }
  }

  async function loadGroups() {
    let snap = await getDoc(doc(db, "accounts", user.uid));
    let list = snap.data()?.groups || [];
    groupsUl.innerHTML = "";
    list.forEach(g => {
      let li = document.createElement("li");
      li.textContent = g.name + " (" + g.code + ")";
      li.onclick = () => openChat(g.code, "group", g.name);
      groupsUl.appendChild(li);
    });
  }

  function openChat(id, type, name) {
    if (unsub) unsub();
    chatId = id;
    chatType = type;
    chatMessages.innerHTML = "";
    replyPreview.textContent = "";
    replyTo = null;
    chatPopup.style.display = "flex";
    chatTitle.textContent = name;
    document.getElementById("leaveGroupBtn").style.display = "none";
    document.getElementById("deleteGroupBtn").style.display = "none";

    if (type === "group") {
      document.getElementById("leaveGroupBtn").style.display = "inline-block";
      getDoc(doc(db, "groups", id)).then(snap => {
        let g = snap.data();
        if (g.owner === user.uid) document.getElementById("deleteGroupBtn").style.display = "inline-block";
      });
    }

    let ref;
    if (type === "friend") {
      let cid = [user.uid, id].sort().join("_");
      ref = collection(db, "directMessages", cid, "messages");
    } else {
      ref = collection(db, "groups", id, "messages");
    }

    let q = query(ref, orderBy("timestamp"));
    unsub = onSnapshot(q, snap => {
      chatMessages.innerHTML = "";
      snap.forEach(d => renderMessage(d));
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  function renderMessage(d) {
    let m = d.data();
    let div = document.createElement("div");
    div.className = "message-bubble " + (m.user === user.uid ? "self" : "friend");
    let uname = document.createElement("div");
    uname.className = "username";
    uname.textContent = m.username;
    div.appendChild(uname);
    if (m.reply) {
      let r = document.createElement("div");
      r.className = "reply-preview";
      r.textContent = "↪ " + m.reply.text;
      div.appendChild(r);
    }
    let text = document.createElement("div");
    text.textContent = m.text;
    div.appendChild(text);
    chatMessages.appendChild(div);
  }

  document.getElementById("sendBtn").onclick = sendMessage;

  async function sendMessage() {
    let text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = "";

    let msg = { user: user.uid, username, text, timestamp: serverTimestamp() };
    if (replyTo) { msg.reply = { id: replyTo.id, text: replyTo.text }; replyTo = null; replyPreview.textContent = ""; }

    if (chatType === "friend") {
      let cid = [user.uid, chatId].sort().join("_");
      await addDoc(collection(db, "directMessages", cid, "messages"), msg);

      let snap = await getDoc(doc(db, "accounts", chatId));
      let friendOneSignalId = snap.data()?.oneSignalId;
      if (friendOneSignalId) {
        fetch("https://onesignal.com/api/v1/notifications", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Basic YOUR_ONESIGNAL_REST_API_KEY"
          },
          body: JSON.stringify({
            app_id: "52c04054-eb84-4e70-8f4d-37cb895e365c",
            include_player_ids: [friendOneSignalId],
            headings: { "en": username + " sent a message" },
            contents: { "en": text }
          })
        });
      }

    } else {
      await addDoc(collection(db, "groups", chatId, "messages"), msg);
    }
  }

  document.getElementById("addFriendBtn").onclick = async () => {
    let friendUID = document.getElementById("friendCode").value.trim();
    if (!friendUID) return alert("Enter UID");
    if (friendUID === user.uid) return alert("Cannot add yourself");
    let accRef = doc(db, "accounts", friendUID);
    let snap = await getDoc(accRef);
    if (!snap.exists()) return alert("User not found");
    await updateDoc(doc(db, "accounts", user.uid), { friends: arrayUnion(friendUID) });
    await updateDoc(accRef, { friends: arrayUnion(user.uid) });
    document.getElementById("friendCode").value = "";
    loadFriends();
  };

  document.getElementById("createGroupBtn").onclick = async () => {
    let name = document.getElementById("groupName").value.trim();
    if (!name) return alert("Enter group name");
    let code = Math.random().toString(36).substring(2, 8);
    await setDoc(doc(db, "groups", code), { name, code, owner: user.uid, members: [user.uid] });
    let acc = await getDoc(doc(db, "accounts", user.uid));
    let groups = acc.data().groups || [];
    groups.push({ name, code });
    await updateDoc(doc(db, "accounts", user.uid), { groups });
    document.getElementById("groupName").value = "";
    loadGroups();
    alert("Group code: " + code);
  };

  document.getElementById("joinGroupBtn").onclick = async () => {
    let code = document.getElementById("joinCode").value.trim();
    if (!code) return alert("Enter code");
    let gref = doc(db, "groups", code);
    let snap = await getDoc(gref);
    if (!snap.exists()) return alert("Group not found");
    let g = snap.data();
    await updateDoc(gref, { members: arrayUnion(user.uid) });
    let acc = await getDoc(doc(db, "accounts", user.uid));
    let groups = acc.data().groups || [];
    groups.push({ name: g.name, code });
    await updateDoc(doc(db, "accounts", user.uid), { groups });
    document.getElementById("joinCode").value = "";
    loadGroups();
  };

  document.getElementById("closeChat").onclick = () => {
    chatPopup.style.display = "none";
    if (unsub) unsub();
  };
});
</script>

</body>
</html>
