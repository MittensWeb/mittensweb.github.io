<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mittens</title>
<link rel="stylesheet" href="/assets/styles.css">
<style>
.mobile-banner{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:14px 18px;
border-radius:12px;
display:none;
align-items:center;
gap:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
z-index:9999;
}
.mobile-banner button{
background:#ff751f;
border:none;
padding:8px 12px;
border-radius:8px;
color:#fff;
cursor:pointer;
}
.close-btn{
background:transparent;
border:none;
font-size:18px;
color:#888;
cursor:pointer;
padding:6px 10px;
border-radius:8px;
}
.close-btn:hover{
background:rgba(255,255,255,0.1);
color:#fff;
}
</style>
</head>

<body>

<div class="mobile-banner" id="mobileBanner">
<div>Download our Mobile App</div>
<button id="downloadApp">Download</button>
<button class="close-btn" id="closeBanner">✕</button>
</div>

<div class="app">

<aside class="sidebar">

<div class="sidebar-top">
<img src="/assets/logo.png" class="logo">
<div class="brand">
<div class="app-name">Mittens</div>
<div class="status-dot"></div>
</div>
</div>

<div class="user-code-box">
<div class="code-label">Your Code</div>
<div class="code-row">
<span id="userCode"></span>
<button id="copyCodeBtn">Copy</button>
</div>
</div>

<div class="search-box">
<input id="searchInput" placeholder="Search...">
</div>

<div class="section">
<div class="section-title">Friends</div>
<div class="input-row">
<input id="friendCode" placeholder="Add friend">
<button id="addFriendBtn">+</button>
</div>
<ul id="friendsUl"></ul>
</div>

<div class="section">
<div class="section-title">Groups</div>
<div class="input-row">
<input id="groupName" placeholder="New group">
<button id="createGroupBtn">+</button>
</div>
<div class="input-row">
<input id="joinCode" placeholder="Join code">
<button id="joinGroupBtn">→</button>
</div>
<ul id="groupsUl"></ul>
</div>

<div class="sidebar-bottom">
<div id="userEmail"></div>
<button id="logout">Logout</button>
</div>

</aside>

<main class="chat-area">

<div class="empty" id="emptyState">
<h2>Mittens</h2>
<p>Select a chat to start messaging</p>
</div>

<div class="chat" id="chatContainer">

<div class="chat-header">
<div>
<div id="chatTitle"></div>
<div id="chatSub"></div>
</div>
<button id="closeChat">✕</button>
</div>

<div class="messages" id="chatMessages"></div>

<div class="chat-input">
<input id="chatInput" placeholder="Type message">
<button id="sendBtn">Send</button>
</div>

</div>

</main>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, arrayUnion, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAgLH8g-20u6zDAP2eQ0oU94DYpx5RjabI",
authDomain:"mittens-ac688.firebaseapp.com",
projectId:"mittens-ac688",
storageBucket:"mittens-ac688.firebasestorage.app",
messagingSenderId:"524822883656",
appId:"1:524822883656:web:b03fc3d96e6925a3da977d"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user,chatId,chatType,unsub;

const mobileBanner=document.getElementById("mobileBanner");

if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
mobileBanner.style.display="flex";
}

document.getElementById("downloadApp").onclick=()=>{
window.location.href="/app/mittens.apk";
};

document.getElementById("closeBanner").onclick=()=>{
mobileBanner.style.display="none";
};

const friendsUl=document.getElementById("friendsUl");
const groupsUl=document.getElementById("groupsUl");
const chatMessages=document.getElementById("chatMessages");
const chatContainer=document.getElementById("chatContainer");
const emptyState=document.getElementById("emptyState");
const chatTitle=document.getElementById("chatTitle");
const chatInput=document.getElementById("chatInput");
const chatSub=document.getElementById("chatSub");
const userCodeEl=document.getElementById("userCode");

function generateCode(length=6){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let code="";
for(let i=0;i<length;i++) code+=chars[Math.floor(Math.random()*chars.length)];
return code;
}

onAuthStateChanged(auth,async(u)=>{
if(!u){location="/login/index.html";return;}
user=u;
document.getElementById("userEmail").textContent=u.email;

let ref=doc(db,"accounts",u.uid);
let snap=await getDoc(ref);

if(!snap.exists()){
let code=generateCode();
await setDoc(ref,{uid:u.uid,friends:[],groups:[],online:true,lastSeen:serverTimestamp(),code});
userCodeEl.textContent=code;
}else{
let data=snap.data();
userCodeEl.textContent=data.code||generateCode();
await updateDoc(ref,{online:true,lastSeen:serverTimestamp()});
}

setupPresence();
loadFriends();
loadGroups();
});

document.getElementById("copyCodeBtn").onclick=()=>{
navigator.clipboard.writeText(userCodeEl.textContent);
};

function setupPresence(){
window.addEventListener("beforeunload", async ()=>{
await updateDoc(doc(db,"accounts",user.uid),{online:false,lastSeen:serverTimestamp()});
});
document.addEventListener("visibilitychange", async ()=>{
await updateDoc(doc(db,"accounts",user.uid),{online:document.visibilityState==="visible",lastSeen:serverTimestamp()});
});
}

async function loadFriends(){
let snap=await getDoc(doc(db,"accounts",user.uid));
let list=snap.data()?.friends||[];
friendsUl.innerHTML="";
list.forEach(f=>{
onSnapshot(doc(db,"accounts",f), accSnap=>{
let data=accSnap.data();
let li=document.createElement("li");
li.textContent=(data?.username||f)+" "+(data?.online?"online":"offline");
li.onclick=()=>openChat(f,"friend",data?.username||f);
friendsUl.appendChild(li);
});
});
}

async function loadGroups(){
let snap=await getDoc(doc(db,"accounts",user.uid));
let list=snap.data()?.groups||[];
groupsUl.innerHTML="";
list.forEach(g=>{
let li=document.createElement("li");
li.textContent=g.name;
li.onclick=()=>openChat(g.code,"group",g.name);
groupsUl.appendChild(li);
});
}

function openChat(id,type,name){
if(unsub)unsub();
chatId=id;
chatType=type;
chatMessages.innerHTML="";
chatContainer.style.display="flex";
emptyState.style.display="none";
chatTitle.textContent=name;

let ref=type==="friend"
?collection(db,"directMessages",[user.uid,id].sort().join("_"),"messages")
:collection(db,"groups",id,"messages");

unsub=onSnapshot(query(ref,orderBy("timestamp")),snap=>{
chatMessages.innerHTML="";
snap.forEach(d=>{
let m=d.data();
let div=document.createElement("div");
div.className=m.user===user.uid?"bubble self":"bubble other";
div.textContent=m.text;
chatMessages.appendChild(div);
});
chatMessages.scrollTop=chatMessages.scrollHeight;
});
}

document.getElementById("sendBtn").onclick=sendMessage;

chatInput.addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage();
});

async function sendMessage(){
let text=chatInput.value.trim();
if(!text)return;
chatInput.value="";
let msg={user:user.uid,text,timestamp:serverTimestamp()};
if(chatType==="friend"){
await addDoc(collection(db,"directMessages",[user.uid,chatId].sort().join("_"),"messages"),msg);
}else{
await addDoc(collection(db,"groups",chatId,"messages"),msg);
}
}

document.getElementById("addFriendBtn").onclick=async()=>{
let code=document.getElementById("friendCode").value.trim();
if(!code)return;
let accounts=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
let snap=await accounts.getDocs(collection(db,"accounts"));
let target=null;
snap.forEach(d=>{if(d.data().code===code)target=d.id});
if(!target)return;
await updateDoc(doc(db,"accounts",user.uid),{friends:arrayUnion(target)});
await updateDoc(doc(db,"accounts",target),{friends:arrayUnion(user.uid)});
loadFriends();
};

document.getElementById("createGroupBtn").onclick=async()=>{
let name=document.getElementById("groupName").value.trim();
if(!name)return;
let code=Math.random().toString(36).substring(2,8);
await setDoc(doc(db,"groups",code),{name,code,members:[user.uid]});
let acc=await getDoc(doc(db,"accounts",user.uid));
let groups=acc.data().groups||[];
groups.push({name,code});
await updateDoc(doc(db,"accounts",user.uid),{groups});
loadGroups();
};

document.getElementById("joinGroupBtn").onclick=async()=>{
let code=document.getElementById("joinCode").value.trim();
if(!code)return;
let g=await getDoc(doc(db,"groups",code));
if(!g.exists())return;
await updateDoc(doc(db,"groups",code),{members:arrayUnion(user.uid)});
let acc=await getDoc(doc(db,"accounts",user.uid));
let groups=acc.data().groups||[];
groups.push({name:g.data().name,code});
await updateDoc(doc(db,"accounts",user.uid),{groups});
loadGroups();
};



document.getElementById("closeChat").onclick=()=>{
chatContainer.style.display="none";
emptyState.style.display="flex";
};

document.getElementById("logout").onclick=()=>signOut(auth);

document.getElementById("searchInput").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
[...document.querySelectorAll("li")].forEach(li=>{
li.style.display=li.textContent.toLowerCase().includes(val)?"block":"none";
});
});
</script>

</body>
</html>
